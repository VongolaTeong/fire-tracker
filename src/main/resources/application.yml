spring:
  application:
    name: fire-tracker

  # All credentials come from the environment. Local defaults point at a dev Postgres
  # so the app runs out of the box; production injects real values via env vars.
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/firetracker}
    username: ${DATABASE_USERNAME:firetracker}
    password: ${DATABASE_PASSWORD:firetracker}

  jpa:
    # Flyway owns the schema; Hibernate only validates that entities match it.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

# Expose only health/info publicly — the uptime pinger (Step 9) targets /actuator/health.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}

# Market-data ingestion (Step 5). Feeds are free and keyless; scheduling is opt-in per
# environment so dev/CI/tests never call out. Symbols map an instrument ticker to the price
# feed's symbol (Stooq).
app:
  market-data:
    reporting-currency: SGD
    cron: "0 0 18 * * *"
    scheduling:
      enabled: ${APP_MARKET_DATA_SCHEDULING_ENABLED:false}
    fx:
      base-url: https://api.frankfurter.dev/v1
    price:
      base-url: https://stooq.com/q/l/
      symbols:
        VWRA: vwra.uk
        ES3: es3.sg

# Monte Carlo FIRE projection (Step 6). Conservative broad-market assumptions; the seed is fixed
# so a given request always returns the same fan. monthly-contribution is only a fallback — the
# DCA rate is normally inferred from the ledger's actual buy history.
  projection:
    annual-mean-return: 0.07
    annual-volatility: 0.15
    paths: 10000
    seed: 42
    monthly-contribution: 1000.00

  # CORS for the separately-deployed Vue dashboard (Step 7). Defaults to the Vite dev origin;
  # production sets the real frontend origin via APP_CORS_ALLOWED_ORIGINS (comma-separated).
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
